<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>.dat Parameter File Editor</title>

    <!-- Anti-flash: apply saved theme before first paint -->
    <script>
        (function () {
            var theme = localStorage.getItem('rparams-theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vendor/font-awesome.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0066aa">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Params Editor">
</head>
<body>
    <div class="topnav" id="topnav">
        <!-- logos row: always pinned left and right -->
        <div class="topnav-top">
            <img src="images/RafLogo.svg" alt="Rafael logo" class="raf-logo">
            <span class="topnav-title">Parameters File Editor</span>
            <img src="images/logo-title.svg" alt="Project logo" class="head-img">
        </div>

        <!-- controls row: wraps freely on narrow screens -->
        <div class="topnav-controls">
            <label>JSON schema:</label>
            <input type="file" id="jsonFileInput" accept=".json">

            <label>Load .dat:</label>
            <input type="file" id="datFileInput" accept=".dat">

            <label>Output name:</label>
            <input type="text" id="outputName" value="params" spellcheck="false">

            <button id="downloadBtn" class="nav-btn">
                <i class="fa fa-download"></i> Download .dat
            </button>

            <div class="search-wrapper">
                <i class="fa fa-search search-icon"></i>
                <input type="text" id="paramSearch" placeholder="Filter parameters…" spellcheck="false" autocomplete="off">
            </div>

            <div class="nav-spacer"></div>

            <button id="installBtn" class="theme-toggle" title="Install app" aria-label="Install app" style="display:none">
                <i class="fa fa-arrow-circle-down"></i>
            </button>

            <button class="theme-toggle" id="theme-toggle-btn" title="Toggle theme" aria-label="Toggle theme">
                <i class="fa fa-moon-o" id="theme-icon"></i>
            </button>
        </div>
    </div>

    <table id="paramsTable">
        <thead>
            <tr>
                <th>Parameter</th>
                <th>Type</th>
                <th>Dims</th>
                <th>Value</th>
                <th>Units</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="statusBar">
        No schema loaded. Run <code>ExportParamsJson</code> in MATLAB first, then load the .json here.
    </div>

    <script>
    // ── binary-format.js ────────────────────────────────────────────────────

    function typeSize(type) {
        switch (type) {
            case 'double': case 'int64':  case 'uint64':  return 8;
            case 'single': case 'int32':  case 'uint32':  return 4;
            case 'int16':  case 'uint16':                 return 2;
            case 'int8':   case 'uint8':
            case 'logical': case 'boolean':               return 1;
            default:                                       return 4;
        }
    }

    function normalizeDims(dims) {
        if (!Array.isArray(dims) || dims.length === 0) return [1, 1];
        if (dims.length === 1)                          return [dims[0], 1];
        return [dims[0], dims[1]];
    }

    function entryBytes(entry) {
        if (entry.isJunk) return entry.elemCount;
        const [r, c] = normalizeDims(entry.dims);
        return r * c * typeSize(entry.type);
    }

    function resolveOffsets(formatList) {
        let offset = 0;
        return formatList.map(entry => {
            const enriched = { ...entry, byteOffset: offset };
            offset += entryBytes(entry);
            return enriched;
        });
    }

    function totalBytes(formatList) {
        return formatList.reduce((acc, e) => acc + entryBytes(e), 0);
    }

    // ── dat-io.js ────────────────────────────────────────────────────────────

    function readDat(buffer, formatList) {
        const view   = new DataView(buffer);
        const values = {};

        for (const entry of formatList) {
            if (entry.isJunk) continue;

            const [rows, cols] = normalizeDims(entry.dims);
            const count        = rows * cols;
            const step         = typeSize(entry.type);
            const result       = [];
            let   bytePos      = entry.byteOffset;

            for (let i = 0; i < count; i++) {
                result.push(readScalar(view, bytePos, entry.type));
                bytePos += step;
            }

            values[entry.path] = count === 1 ? result[0] : result;
        }

        return values;
    }

    function writeDat(values, formatList, byteCount) {
        const buffer = new ArrayBuffer(byteCount);
        const view   = new DataView(buffer);

        for (const entry of formatList) {
            if (entry.isJunk) continue;

            const [rows, cols] = normalizeDims(entry.dims);
            const count        = rows * cols;
            const raw          = values[entry.path] ?? entry.value;
            const step         = typeSize(entry.type);
            let   bytePos      = entry.byteOffset;

            for (let i = 0; i < count; i++) {
                const v = Array.isArray(raw) ? (raw[i] ?? 0) : (i === 0 ? raw : 0);
                writeScalar(view, bytePos, entry.type, v);
                bytePos += step;
            }
        }

        return buffer;
    }

    function readScalar(view, offset, type) {
        switch (type) {
            case 'double':  return view.getFloat64(offset, true);
            case 'single':  return view.getFloat32(offset, true);
            case 'int8':    return view.getInt8(offset);
            case 'int16':   return view.getInt16(offset, true);
            case 'int32':   return view.getInt32(offset, true);
            case 'int64':   return Number(view.getBigInt64(offset, true));
            case 'uint8':   return view.getUint8(offset);
            case 'uint16':  return view.getUint16(offset, true);
            case 'uint32':  return view.getUint32(offset, true);
            case 'uint64':  return Number(view.getBigUint64(offset, true));
            case 'logical':
            case 'boolean': return view.getUint8(offset) !== 0;
            default:        return view.getInt32(offset, true);
        }
    }

    function writeScalar(view, offset, type, value) {
        const n = Number(value);
        switch (type) {
            case 'double':  view.setFloat64(offset, n, true);  break;
            case 'single':  view.setFloat32(offset, n, true);  break;
            case 'int8':    view.setInt8(offset, n);           break;
            case 'int16':   view.setInt16(offset, n, true);    break;
            case 'int32':   view.setInt32(offset, n, true);    break;
            case 'int64':   view.setBigInt64(offset, BigInt(Math.trunc(n)), true); break;
            case 'uint8':   view.setUint8(offset, n);          break;
            case 'uint16':  view.setUint16(offset, n, true);   break;
            case 'uint32':  view.setUint32(offset, n, true);   break;
            case 'uint64':  view.setBigUint64(offset, BigInt(Math.trunc(Math.max(0, n))), true); break;
            case 'logical':
            case 'boolean': view.setUint8(offset, n ? 1 : 0); break;
            default:        view.setInt32(offset, n, true);    break;
        }
    }

    // ── app.js ───────────────────────────────────────────────────────────────

    let formatList    = null;
    let currentValues = {};

    document.getElementById('jsonFileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;

        readAsText(file).then(text => {
            try {
                const parsed = JSON.parse(text);
                if (!parsed.meta || !Array.isArray(parsed.format)) {
                    throw new Error('JSON is missing "meta" or "format" keys');
                }

                formatList    = resolveOffsets(parsed.format);
                currentValues = {};

                for (const entry of formatList) {
                    if (!entry.isJunk) currentValues[entry.path] = entry.value;
                }

                document.getElementById('outputName').value =
                    file.name.replace(/\.json$/i, '') + '_' + dateSuffix();

                renderTable();
                filterTable();
                saveSchema(text, file.name.replace(/\.json$/i, '') + '_' + dateSuffix());
                setStatus(
                    `Loaded: ${file.name}  ·  bus: ${parsed.meta.busName}` +
                    `  ·  pragma: ${parsed.meta.pragma}  ·  ${totalBytes(formatList)} bytes`
                );
            } catch (err) {
                setStatus(`JSON error: ${err.message}`, true);
            }
        });
    });

    document.getElementById('datFileInput').addEventListener('change', e => {
        const file = e.target.files[0];
        if (!file) return;
        if (!formatList) { setStatus('Load a JSON schema first.', true); return; }

        readAsArrayBuffer(file).then(buf => {
            try {
                const loaded = readDat(buf, formatList);
                Object.assign(currentValues, loaded);
                updateTableValues();
                saveValues();
                setStatus(`Loaded .dat: ${file.name}  ·  ${buf.byteLength} bytes`);
            } catch (err) {
                setStatus(`.dat read error: ${err.message}`, true);
            }
        });
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!formatList) { setStatus('Load a JSON schema first.', true); return; }

        syncValuesFromTable();
        const bytes  = totalBytes(formatList);
        const buffer = writeDat(currentValues, formatList, bytes);

        let name = document.getElementById('outputName').value.trim() || 'params';
        if (!name.endsWith('.dat')) name += '.dat';

        downloadBuffer(buffer, name);
        saveValues();
        localStorage.setItem(LS_OUTPUT, document.getElementById('outputName').value.trim() || 'params');
        setStatus(`Downloaded: ${name}  ·  ${bytes} bytes`);
    });

    function renderTable() {
        const tbody = document.querySelector('#paramsTable tbody');
        tbody.innerHTML = '';
        if (!formatList) return;

        for (const entry of formatList) {
            if (entry.isJunk) continue;

            const [rows, cols] = normalizeDims(entry.dims);
            const count  = rows * cols;
            const isBool = entry.type === 'logical' || entry.type === 'boolean';

            const tr = document.createElement('tr');

            const tdPath = document.createElement('td');
            tdPath.className   = 'path';
            tdPath.textContent = entry.path;
            tr.appendChild(tdPath);

            appendText(tr, 'td', entry.type);
            appendText(tr, 'td', `${rows}×${cols}`);

            const tdVal = document.createElement('td');
            tdVal.className = 'val-cell';
            tdVal.appendChild(makeInput(entry, count, isBool, currentValues[entry.path]));
            tr.appendChild(tdVal);

            appendText(tr, 'td', entry.units || '');

            tbody.appendChild(tr);
        }
    }

    function makeInput(entry, count, isBool, value) {
        const inp = document.createElement('input');
        inp.dataset.path = entry.path;

        if (isBool) {
            inp.type    = 'checkbox';
            inp.checked = Array.isArray(value) ? !!value[0] : !!value;
        } else if (count === 1) {
            inp.type  = 'number';
            inp.step  = 'any';
            inp.value = Array.isArray(value) ? (value[0] ?? '') : (value ?? '');
        } else {
            inp.type  = 'text';
            inp.title = `${count} elements – column-major order`;
            inp.value = (Array.isArray(value) ? value : [value]).join(', ');
        }

        return inp;
    }

    function updateTableValues() {
        for (const entry of formatList) {
            if (entry.isJunk) continue;

            const inp = inputFor(entry.path);
            if (!inp) continue;

            const val    = currentValues[entry.path];
            const isBool = entry.type === 'logical' || entry.type === 'boolean';
            const [r, c] = normalizeDims(entry.dims);
            const count  = r * c;

            if (isBool) {
                inp.checked = Array.isArray(val) ? !!val[0] : !!val;
            } else if (count === 1) {
                inp.value = Array.isArray(val) ? (val[0] ?? '') : (val ?? '');
            } else {
                inp.value = (Array.isArray(val) ? val : [val]).join(', ');
            }
        }
    }

    function syncValuesFromTable() {
        for (const entry of formatList) {
            if (entry.isJunk) continue;

            const inp = inputFor(entry.path);
            if (!inp) continue;

            const [r, c] = normalizeDims(entry.dims);
            const count  = r * c;
            const isBool = entry.type === 'logical' || entry.type === 'boolean';

            if (isBool) {
                currentValues[entry.path] = inp.checked ? 1 : 0;
            } else if (count === 1) {
                currentValues[entry.path] = parseFloat(inp.value) || 0;
            } else {
                currentValues[entry.path] = inp.value
                    .split(',')
                    .map(s => parseFloat(s.trim()) || 0);
            }
        }
    }

    function inputFor(path) {
        return document.querySelector(`[data-path="${path}"]`);
    }

    function appendText(parent, tag, text) {
        const el = document.createElement(tag);
        el.textContent = text;
        parent.appendChild(el);
        return el;
    }

    function setStatus(msg, isError = false) {
        const bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.classList.toggle('error', isError);
    }

    function readAsText(file) {
        return new Promise((resolve, reject) => {
            const r  = new FileReader();
            r.onload  = ev => resolve(ev.target.result);
            r.onerror = ()  => reject(new Error('Could not read file'));
            r.readAsText(file);
        });
    }

    function readAsArrayBuffer(file) {
        return new Promise((resolve, reject) => {
            const r  = new FileReader();
            r.onload  = ev => resolve(ev.target.result);
            r.onerror = ()  => reject(new Error('Could not read file'));
            r.readAsArrayBuffer(file);
        });
    }

    function dateSuffix() {
        const d = new Date();
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const yy = String(d.getFullYear()).slice(-2);
        return dd + mm + yy;
    }

    function downloadBuffer(buffer, filename) {
        const blob = new Blob([buffer], { type: 'application/octet-stream' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Persistence (localStorage) ──────────────────────────────────────────
    const LS_SCHEMA = 'rparams-schema-json';
    const LS_VALUES = 'rparams-saved-values';
    const LS_OUTPUT = 'rparams-output-name';

    function saveSchema(jsonText, outputName) {
        try {
            localStorage.setItem(LS_SCHEMA, jsonText);
            localStorage.setItem(LS_OUTPUT, outputName);
            localStorage.removeItem(LS_VALUES); // clear stale values for new schema
        } catch (e) { /* storage quota – ignore */ }
    }

    function saveValues() {
        if (!formatList) return;
        try {
            localStorage.setItem(LS_VALUES, JSON.stringify(currentValues));
        } catch (e) { /* storage quota – ignore */ }
    }

    function restoreState() {
        const schemaText = localStorage.getItem(LS_SCHEMA);
        if (!schemaText) return;
        try {
            const parsed = JSON.parse(schemaText);
            if (!parsed.meta || !Array.isArray(parsed.format)) return;

            formatList    = resolveOffsets(parsed.format);
            currentValues = {};
            for (const entry of formatList) {
                if (!entry.isJunk) currentValues[entry.path] = entry.value;
            }

            const savedText = localStorage.getItem(LS_VALUES);
            if (savedText) {
                try { Object.assign(currentValues, JSON.parse(savedText)); }
                catch (e) { /* corrupt – ignore */ }
            }

            const savedOutput = localStorage.getItem(LS_OUTPUT);
            if (savedOutput) document.getElementById('outputName').value = savedOutput;

            renderTable();
            filterTable();
            setStatus(
                `Restored: bus: ${parsed.meta.busName}` +
                `  ·  pragma: ${parsed.meta.pragma}  ·  ${totalBytes(formatList)} bytes`
            );
        } catch (e) {
            localStorage.removeItem(LS_SCHEMA);
            localStorage.removeItem(LS_VALUES);
        }
    }

    restoreState();

    // ── Parameter filter ────────────────────────────────────────────────────
    function filterTable() {
        const q = (document.getElementById('paramSearch').value || '').toLowerCase();
        document.querySelectorAll('#paramsTable tbody tr').forEach(tr => {
            const path = tr.querySelector('.path');
            const match = !q || (path && path.textContent.toLowerCase().includes(q));
            tr.style.display = match ? '' : 'none';
        });
    }

    document.getElementById('paramSearch').addEventListener('input', filterTable);

    // ── Topnav height tracker (keeps body padding + sticky thead in sync) ────
    (function () {
        const nav = document.getElementById('topnav');
        function syncHeight() {
            document.documentElement.style.setProperty('--topnav-h', nav.offsetHeight + 'px');
        }
        syncHeight();
        new ResizeObserver(syncHeight).observe(nav);
    })();

    // ── Theme toggle ─────────────────────────────────────────────────────────
    (function () {
        const btn  = document.getElementById('theme-toggle-btn');
        const icon = document.getElementById('theme-icon');

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                icon.className = 'fa fa-sun-o';
            } else {
                document.documentElement.removeAttribute('data-theme');
                icon.className = 'fa fa-moon-o';
            }
        }

        // Sync icon with whatever the anti-flash script already applied
        applyTheme(localStorage.getItem('rparams-theme') || 'light');

        btn.addEventListener('click', function () {
            const current = document.documentElement.getAttribute('data-theme');
            const next    = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('rparams-theme', next);
            applyTheme(next);
        });
    })();

    // ── PWA install prompt ───────────────────────────────────────────────────
    (function () {
        let deferred = null;
        const btn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferred = e;
            btn.style.display = '';
        });

        btn.addEventListener('click', async () => {
            if (!deferred) return;
            deferred.prompt();
            const { outcome } = await deferred.userChoice;
            if (outcome === 'accepted') {
                btn.style.display = 'none';
                deferred = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            btn.style.display = 'none';
            deferred = null;
        });
    })();

    // ── Service Worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }
    </script>
</body>
</html>
